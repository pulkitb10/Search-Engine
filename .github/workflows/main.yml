name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          git push https://Pulkitb10:$HF_TOKEN@huggingface.co/spaces/Pulkitb10/Search_Engine_LLM main
